# 老H自媒体运营知识库 — MkDocs Material 配置
site_name: 老H自媒体
site_description: 老黄的专属自媒体运营知识库 — 小红书 · 内容创作 · 运营方法论 · 竞品研究
site_author: 老黄
site_url: https://h-social.github.io

repo_url: https://github.com/dylantoo/h-social.github.io
repo_name: 老H自媒体

# 自媒体风主题（亮色+暗色双模式）
theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

# 插件
plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      height: auto
      width: auto
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

# Markdown 扩展
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      title: 目录

